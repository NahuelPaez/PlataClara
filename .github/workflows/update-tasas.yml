name: Actualizar Tasas

on:
  schedule:
    # Todos los días a las 10am hora Argentina (UTC-3 → 13:00 UTC)
    - cron: '0 13 * * 1-5'
  workflow_dispatch: # También permite correrlo manualmente desde GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar Chromium
        run: npx playwright install chromium --with-deps

      - name: Correr scraper
        run: node scripts/scrape-tasas.js

      - name: Commit y push si hay cambios
        run: |
          git config user.name "PlataClara Bot"
          git config user.email "hola.plataclara@gmail.com"
          git add src/data/tasas.json
          git diff --staged --quiet || git commit -m "chore: actualizar tasas $(date +'%Y-%m-%d')"
          git push
