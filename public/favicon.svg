  <!-- Columnas -->
  <rect x="19" y="27" width="4" height="14" rx="1" fill="white" opacity="0.95"/>
  <rect x="27" y="27" width="4" height="14" rx="1" fill="white" opacity="0.95"/>
  <rect x="35" y="27" width="4" height="14" rx="1" fill="white" opacity="0.95"/>
  <rect x="43" y="27" width="4" height="14" rx="1" fill="white" opacity="0.95"/>

  <!-- Base -->
